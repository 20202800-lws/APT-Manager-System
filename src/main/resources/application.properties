# ==========================================
# 1. 애플리케이션 기본 설정
# ==========================================
spring.application.name=membermanager
server.port=8080
# 0.0.0.0은 필수! (이게 있어야 팀원이 접속 가능)
server.address=0.0.0.0
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==========================================
# 2. 데이터베이스 연결 (서버 본체용 설정)
# ==========================================
# [수정1] 서버 본체는 localhost로 접속하는 게 정석입니다.
spring.datasource.url=jdbc:mysql://localhost:3306/apt_management?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true

# [계정] 아까 만든 apartners 계정
spring.datasource.username=jsw

# [수정2] 아까 설정한 비밀번호 (apartners1234!)
spring.datasource.password=1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. JPA 설정
# ==========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# [설정] 이미 테이블을 완벽하게 만들었으므로 'update'나 'none'을 씁니다.
# update: 엔티티가 변경되면 DB도 살짝 고침 (개발 중 추천)
# none: DB 절대 건드리지 않음 (완전 보수적)
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# 4. 화면(JSP) 경로 설정
# ==========================================
# [수정3] 실제 폴더명이 jsp인지 views인지 꼭 확인하세요!
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# 파일 업로드 설정
# 1. 파일 하나당 최대 크기 (10MB)
spring.servlet.multipart.max-file-size=10MB
# 2. 요청 하나당 최대 크기 (50MB)
spring.servlet.multipart.max-request-size=50MB
# 3. 파일이 저장될 진짜 경로 (C드라이브)
file.upload-dir=C:/membermanager/upload/