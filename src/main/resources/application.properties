# ==========================================
# 1. 애플리케이션 기본 설정
# ==========================================
spring.application.name=membermanager
server.port=8080
# 0.0.0.0은 필수! (이게 있어야 팀원이 접속 가능)
server.address=0.0.0.0
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==========================================
# 2. 데이터베이스 연결
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/apt_management?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=apartners
spring.datasource.password=apartners1234!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. JPA 설정
# ==========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# 4. 화면(JSP) 및 세션 설정
# ==========================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# 세션 유지 시간을 120분(2시간)으로 넉넉하게 설정
server.servlet.session.timeout=120m

# ==========================================
# 5. 파일 업로드 설정 (OS 완벽 대응)
# ==========================================
# 파일 하나당 최대 크기 (50MB)
spring.servlet.multipart.max-file-size=50MB
# 요청 한 번당 최대 크기 (여러 장 올릴 때 총합 50MB)
spring.servlet.multipart.max-request-size=50MB
# ※ 파일 저장 경로는 FileHandler.java에서 OS에 맞춰 동적으로 자동 생성하므로 이곳에 적지 않습니다!